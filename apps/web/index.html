<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Afrik'Fid — Consommer malin</title>
  <meta name="description" content="Afrik'Fid — La passerelle de paiement mobile money & carte pour l'Afrique. Cashback fidélité, sécurité bancaire." />
  <meta name="theme-color" content="#E63946" />

  <link rel="icon" type="image/png" href="/afrikfid-logo.png" />
  <link rel="apple-touch-icon" href="/afrikfid-logo.png" />

  <script>
    (function () {
      try {
        var stored = localStorage.getItem('afrikfid-theme');
        var theme = stored === 'light' || stored === 'dark'
          ? stored
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    #root { min-height: 100vh; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
