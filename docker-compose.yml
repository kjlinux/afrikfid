version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: afrikfid_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: afrikfid
      POSTGRES_USER: afrikfid
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-afrikfid_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afrikfid"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: afrikfid_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: afrikfid_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4001
      # Base de données PostgreSQL
      DATABASE_URL: postgres://afrikfid:${POSTGRES_PASSWORD:-afrikfid_secret}@postgres:5432/afrikfid
      DATABASE_SSL: "false"
      # Redis sessions
      REDIS_URL: redis://redis:6379
      # Auth
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SANDBOX_MODE: ${SANDBOX_MODE:-false}
      # Chiffrement (CDC §5.4.1)
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      HMAC_SECRET: ${HMAC_SECRET}
      # SMS
      AT_USERNAME: ${AT_USERNAME:-sandbox}
      AT_API_KEY: ${AT_API_KEY}
      AT_SENDER_ID: ${AT_SENDER_ID:-AfrikFid}
      # Email
      MAILGUN_API_KEY: ${MAILGUN_API_KEY}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN}
      # CinetPay
      CINETPAY_SITE_ID: ${CINETPAY_SITE_ID}
      CINETPAY_API_KEY: ${CINETPAY_API_KEY}
      CINETPAY_NOTIFY_URL: ${CINETPAY_NOTIFY_URL}
      CINETPAY_RETURN_URL: ${CINETPAY_RETURN_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4001:4001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4001/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: afrikfid_web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
  redis_data:
    driver: local
