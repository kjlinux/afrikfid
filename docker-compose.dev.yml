version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: afrikfid_postgres
    environment:
      POSTGRES_DB: afrikfid
      POSTGRES_USER: afrikfid
      POSTGRES_PASSWORD: afrikfid_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afrikfid"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: afrikfid_redis_dev
    restart: unless-stopped
    command: redis-server --save "" --loglevel warning
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: afrikfid_api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4001
      DATABASE_URL: postgres://afrikfid:afrikfid_dev@postgres:5432/afrikfid
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-in-prod
      SANDBOX_MODE: "true"
      FRONTEND_URL: http://localhost:3000
      # ── Mailtrap (email de dev) ──────────────────────────────────────
      # Remplissez avec vos identifiants Mailtrap : https://mailtrap.io
      SMTP_HOST: sandbox.smtp.mailtrap.io
      SMTP_PORT: 2525
      SMTP_USER: 4ab2a53ab909f0
      SMTP_PASS: ecd67aed50beff
      SMTP_FROM: "Afrik'Fid Dev <noreply@afrikfid.com>"
      # IA Insights (PREMIUM — optionnel, laisser vide pour désactiver)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "4001:4001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4001/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  seeder:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: afrikfid_seeder
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://afrikfid:afrikfid_dev@postgres:5432/afrikfid
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-in-prod
      ENCRYPTION_KEY: dev-encryption-key-change-in-prod
    command:
      - sh
      - -c
      - |
        echo "[SEEDER] En attente de l'API..."
        until node -e "require('http').get('http://api:4001/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1))" 2>/dev/null; do sleep 2; done
        echo "[SEEDER] API prete, verification des donnees..."
        node -e "
          const db = require('./src/lib/db');
          db.query('SELECT COUNT(*) as n FROM admins').then(r => {
            if (parseInt(r.rows[0].n) === 0) {
              console.log('[SEEDER] Base vide, lancement du seed...');
              require('./src/seed');
            } else {
              console.log('[SEEDER] Donnees existantes, seed ignore.');
              process.exit(0);
            }
          }).catch(e => { console.error(e); process.exit(1); });
        "
    depends_on:
      api:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: afrikfid_web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: afrikfid_prometheus_dev
    restart: unless-stopped
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.0.0
    container_name: afrikfid_grafana_dev
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
