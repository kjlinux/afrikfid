version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: afrikfid_postgres
    environment:
      POSTGRES_DB: afrikfid
      POSTGRES_USER: afrikfid
      POSTGRES_PASSWORD: afrikfid_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afrikfid"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: afrikfid_api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4001
      DATABASE_URL: postgres://afrikfid:afrikfid_dev@postgres:5432/afrikfid
      JWT_SECRET: dev-secret-change-in-prod
      ADMIN_EMAIL: admin@afrikfid.com
      ADMIN_PASSWORD: admin123
      SANDBOX_MODE: "true"
      FRONTEND_URL: http://localhost:3000
    ports:
      - "4001:4001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4001/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: afrikfid_web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
